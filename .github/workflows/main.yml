name: Verify Human Identity
on:
  workflow_dispatch:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install ethers@5.7.2 verified-agent-identity

      - name: Manual Link
        run: |
          node -e "const { linkHumanToAgent } = require('verified-agent-identity'); const challenge = { name: 'Deall104', description: 'Deall104 AI Agent', did: 'did:iden3:billions:main:2VuHoz6y88EDCtMEfhofb8J2bjovqJxSRgsqAWEXiL' }; linkHumanToAgent(challenge).then(url => console.log('Link:', url)).catch(err => { console.error(err); process.exit(1); });"
